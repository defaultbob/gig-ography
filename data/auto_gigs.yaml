# auto_gigs.yaml — Email-scraped gig entries
#
# Source: Gmail ticket receipts (Ticketmaster, Live Nation, SeeTickets, AXS, StubHub)
# Verified by: purchase confirmation + mobile entry instructions emails
# Last scraped: 2026-02-28 (updated with 2006-2012 UK era)
#
# Verification rules applied:
#   ✓ Must have a ticket purchase/order confirmation email
#   ✓ Must have mobile entry instructions OR ticket delivery email (proves kept, not resold)
#   ✗ Excluded if matched by a "You sold" / "ticket transfer" email
#   ✗ Excluded if event date is in the future (relative to scrape date)
#   ✗ Excluded if already in manual_entries.yaml
#
# Schema matches master_gigs.yaml. Extra fields (source, verified_by) are for
# provenance tracking only — they are ignored by the frontend pipeline.
#
# To re-enrich: cd solicitor && python solicitor.py --input-yaml ../data/auto_gigs.yaml


